<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Algorithmic systems for financial backend engineering</title>
  <desc id="desc">Animated diagram of transaction inputs flowing through routing, state, retry, and settlement nodes in a distributed system.</desc>
  <defs>
    <linearGradient id="bg" x1="90" y1="60" x2="1110" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#F4F8FF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="flow" x1="160" y1="140" x2="1040" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="metric" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="#D7E3F8" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { fill: #0F172A; font: 700 18px 'Segoe UI', Arial, sans-serif; letter-spacing: 0.04em; }
      .title { fill: #0F172A; font: 700 34px 'Segoe UI', Arial, sans-serif; }
      .subtitle { fill: #334155; font: 500 17px 'Segoe UI', Arial, sans-serif; }
      .body { fill: #475569; font: 500 16px 'Segoe UI', Arial, sans-serif; }
      .mono { fill: #0F172A; font: 600 15px 'Consolas', 'Courier New', monospace; }
      .panel {
        fill: url(#panel);
        stroke: #C7D8F4;
        stroke-width: 1.5;
      }
      .flow {
        fill: none;
        stroke: url(#flow);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-dasharray: 12 16;
        animation: dash 8s linear infinite;
      }
      .flow-soft {
        fill: none;
        stroke: #BFDBFE;
        stroke-width: 2;
        opacity: 0.8;
      }
      .node {
        fill: #FFFFFF;
        stroke: #93C5FD;
        stroke-width: 2;
      }
      .node-core {
        fill: #DBEAFE;
        stroke: #2563EB;
        stroke-width: 2.5;
      }
      .pulse {
        transform-origin: center;
        animation: pulse 2.8s ease-in-out infinite;
      }
      .packet {
        fill: #14B8A6;
        filter: url(#glow);
      }
      .packet-alt {
        fill: #2563EB;
        filter: url(#glow);
      }
      .meter-bg {
        fill: #E2E8F0;
      }
      .meter-fill {
        fill: url(#metric);
        transform-origin: left center;
        animation: meter 3.2s ease-in-out infinite;
      }
      .trace {
        opacity: 0.18;
      }
      @keyframes dash {
        to { stroke-dashoffset: -112; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.82; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes meter {
        0%, 100% { transform: scaleX(0.72); }
        50% { transform: scaleX(0.98); }
      }
    </style>
  </defs>

  <rect width="1200" height="640" rx="32" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="640" rx="32" fill="url(#grid)" opacity="0.45"/>

  <circle cx="1025" cy="115" r="82" fill="#DBEAFE" opacity="0.45"/>
  <circle cx="910" cy="510" r="120" fill="#CCFBF1" opacity="0.35"/>
  <circle cx="185" cy="495" r="96" fill="#E0E7FF" opacity="0.55"/>

  <rect x="70" y="76" width="1060" height="488" rx="28" class="panel"/>

  <text x="108" y="134" class="title">From transaction flow to reliable settlement</text>
  <text x="108" y="167" class="subtitle">Backend engineering that combines delivery discipline with systems and algorithmic depth.</text>

  <rect x="108" y="214" width="218" height="254" rx="24" class="panel"/>
  <text x="138" y="255" class="label">INPUT SIGNALS</text>
  <text x="138" y="302" class="body">Transactions</text>
  <text x="138" y="338" class="body">Webhooks</text>
  <text x="138" y="374" class="body">Agent events</text>
  <text x="138" y="410" class="body">External APIs</text>
  <text x="138" y="446" class="body">Settlement files</text>

  <rect x="874" y="214" width="218" height="254" rx="24" class="panel"/>
  <text x="904" y="255" class="label">RELIABLE OUTPUT</text>
  <text x="904" y="302" class="body">Authorized flows</text>
  <text x="904" y="338" class="body">Reconciled states</text>
  <text x="904" y="374" class="body">Observable services</text>
  <text x="904" y="410" class="body">Audit-ready logs</text>
  <text x="904" y="446" class="body">Operational confidence</text>

  <rect x="386" y="214" width="428" height="254" rx="24" class="panel"/>
  <text x="420" y="255" class="label">ALGORITHMIC SYSTEM CORE</text>
  <text x="420" y="505" class="mono">routing  |  ordering  |  retries  |  idempotency  |  partitioning</text>

  <path d="M 268 286 C 350 286 345 266 424 266" class="flow-soft"/>
  <path d="M 268 350 C 350 350 345 318 470 318" class="flow-soft"/>
  <path d="M 268 414 C 350 414 345 374 520 374" class="flow-soft"/>
  <path d="M 776 270 C 860 270 838 286 926 286" class="flow-soft"/>
  <path d="M 776 334 C 860 334 838 350 926 350" class="flow-soft"/>
  <path d="M 776 398 C 860 398 838 414 926 414" class="flow-soft"/>

  <path d="M 268 286 C 350 286 345 266 424 266" class="flow"/>
  <path d="M 268 350 C 350 350 345 318 470 318" class="flow"/>
  <path d="M 268 414 C 350 414 345 374 520 374" class="flow"/>
  <path d="M 552 266 C 616 266 618 238 690 238 C 748 238 746 270 776 270" class="flow"/>
  <path d="M 598 318 C 652 318 654 350 776 350" class="flow"/>
  <path d="M 648 374 C 708 374 714 414 776 414" class="flow"/>

  <circle cx="456" cy="266" r="34" class="node pulse"/>
  <circle cx="456" cy="266" r="17" class="node-core"/>
  <text x="431" y="271" class="mono">Route</text>

  <circle cx="600" cy="318" r="34" class="node pulse"/>
  <circle cx="600" cy="318" r="17" class="node-core"/>
  <text x="581" y="323" class="mono">State</text>

  <circle cx="650" cy="374" r="34" class="node pulse"/>
  <circle cx="650" cy="374" r="17" class="node-core"/>
  <text x="633" y="379" class="mono">Retry</text>

  <circle cx="742" cy="270" r="34" class="node pulse"/>
  <circle cx="742" cy="270" r="17" class="node-core"/>
  <text x="711" y="275" class="mono">Settle</text>

  <circle cx="742" cy="414" r="34" class="node pulse"/>
  <circle cx="742" cy="414" r="17" class="node-core"/>
  <text x="711" y="419" class="mono">Observe</text>

  <circle r="7" class="packet">
    <animateMotion dur="4.4s" repeatCount="indefinite" path="M 268 286 C 350 286 345 266 424 266 C 490 266 492 238 690 238 C 748 238 746 270 926 286"/>
  </circle>
  <circle r="6" class="packet-alt">
    <animateMotion dur="5.2s" begin="0.8s" repeatCount="indefinite" path="M 268 350 C 350 350 345 318 470 318 C 530 318 548 318 776 350 C 860 350 838 350 926 350"/>
  </circle>
  <circle r="6" class="packet">
    <animateMotion dur="5.8s" begin="1.2s" repeatCount="indefinite" path="M 268 414 C 350 414 345 374 520 374 C 586 374 632 414 776 414 C 860 414 838 414 926 414"/>
  </circle>

  <rect x="108" y="500" width="272" height="16" rx="8" class="meter-bg"/>
  <rect x="108" y="500" width="272" height="16" rx="8" class="meter-fill"/>
  <text x="108" y="539" class="mono">latency budget</text>

  <rect x="464" y="540" width="272" height="16" rx="8" class="meter-bg"/>
  <rect x="464" y="540" width="272" height="16" rx="8" class="meter-fill"/>
  <text x="464" y="579" class="mono">consistency under load</text>

  <rect x="820" y="500" width="272" height="16" rx="8" class="meter-bg"/>
  <rect x="820" y="500" width="272" height="16" rx="8" class="meter-fill"/>
  <text x="820" y="539" class="mono">throughput and recovery</text>

  <path d="M 436 446 C 508 456 574 460 638 446" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3 8" class="trace"/>
  <path d="M 640 446 C 688 430 734 430 776 446" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3 8" class="trace"/>
</svg>
